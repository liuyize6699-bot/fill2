<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="刘海的 AI 个人分身对话页。" />
  <title>刘海 AI 个人分身</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --ink: #111827;
      --muted: #667085;
      --line: #dde3ea;
      --line-strong: #c7cfdb;
      --blue: #1769ff;
      --green: #0d8b61;
      --amber: #a26100;
      --dark: #101828;
      --shadow: 0 28px 80px rgba(15, 23, 42, 0.16);
      --radius: 8px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      margin: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.86), rgba(244, 246, 248, 0.92)),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.6;
      letter-spacing: 0;
      overflow: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      border-bottom: 1px solid rgba(16, 24, 40, 0.1);
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(18px);
    }

    .nav-inner {
      max-width: var(--max);
      height: 64px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--dark);
      font-weight: 800;
      white-space: nowrap;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: var(--dark);
      font-size: 13px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nav-btn {
      min-height: 38px;
      padding: 8px 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.72);
      color: #273142;
      font-size: 14px;
      font-weight: 800;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .nav-btn:hover {
      transform: translateY(-1px);
      border-color: var(--line-strong);
      background: #ffffff;
    }

    .chat-stage {
      min-height: 100svh;
      padding: 88px 24px 28px;
      display: grid;
      align-items: center;
      justify-items: center;
    }

    .chat-stage.is-started {
      align-items: end;
    }

    .dialog {
      width: min(780px, 100%);
      height: 232px;
      min-height: 232px;
      display: grid;
      grid-template-rows: auto 0fr auto;
      overflow: hidden;
      border: 1px solid rgba(199, 207, 219, 0.82);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      transition:
        width 0.55s cubic-bezier(0.22, 1, 0.36, 1),
        height 0.55s cubic-bezier(0.22, 1, 0.36, 1),
        grid-template-rows 0.55s cubic-bezier(0.22, 1, 0.36, 1),
        border-color 0.2s ease,
        background 0.2s ease;
    }

    .chat-stage.is-started .dialog {
      width: min(940px, 100%);
      height: min(720px, calc(100svh - 116px));
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: rgba(255, 255, 255, 0.94);
    }

    .dialog.is-settling {
      animation: settleDown 0.7s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes settleDown {
      from {
        transform: translateY(-22svh) scale(0.98);
      }

      to {
        transform: translateY(0) scale(1);
      }
    }

    .dialog-head {
      min-height: 86px;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid transparent;
    }

    .chat-stage.is-started .dialog-head {
      border-bottom-color: var(--line);
    }

    .identity {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .avatar {
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: 50% 36%;
    }

    .identity h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 32px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .identity p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .state {
      min-height: 34px;
      padding: 7px 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #bee7d4;
      border-radius: 999px;
      background: #f0fbf6;
      color: var(--green);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .state::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 5px rgba(13, 139, 97, 0.12);
    }

    .state.is-thinking {
      border-color: #f0d49a;
      background: #fff8e7;
      color: var(--amber);
    }

    .message-stream {
      min-height: 0;
      padding: 0 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: auto;
      opacity: 0;
      transition: opacity 0.3s ease 0.18s, padding 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .chat-stage.is-started .message-stream {
      padding: 18px;
      opacity: 1;
    }

    .message {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: messageIn 0.28s ease both;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-mark {
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: #273142;
      font-size: 12px;
      font-weight: 900;
    }

    .message.user .message-mark {
      order: 2;
      border-color: var(--blue);
      background: var(--blue);
      color: #ffffff;
    }

    .bubble {
      max-width: min(680px, calc(100% - 48px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: #273142;
      font-size: 15px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.06);
    }

    .message.user .bubble {
      border-color: var(--blue);
      background: var(--blue);
      color: #ffffff;
      box-shadow: 0 16px 38px rgba(23, 105, 255, 0.18);
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #98a2b3;
      animation: typing 1s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.14s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.28s;
    }

    @keyframes typing {
      0%,
      80%,
      100% {
        transform: translateY(0);
        opacity: 0.45;
      }

      40% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    .composer-area {
      padding: 0 18px 18px;
      display: grid;
      gap: 12px;
      background: transparent;
      transition: padding 0.55s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.2s ease;
    }

    .chat-stage.is-started .composer-area {
      padding-top: 14px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.86);
    }

    .prompt-row {
      max-height: 80px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      overflow: hidden;
      transition: opacity 0.24s ease, transform 0.24s ease, max-height 0.24s ease;
    }

    .chat-stage.is-started .prompt-row {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
    }

    .prompt-btn {
      min-height: 34px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fbfcfd;
      color: #394150;
      font-size: 13px;
      font-weight: 800;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .prompt-btn:hover {
      border-color: var(--blue);
      background: #f2f6ff;
      color: #114db7;
    }

    .chat-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    .chat-form input {
      min-width: 0;
      min-height: 52px;
      padding: 12px 14px;
      border: 1px solid var(--line-strong);
      border-radius: 7px;
      background: #ffffff;
      color: var(--ink);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .chat-form input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(23, 105, 255, 0.12);
    }

    .send-btn {
      min-width: 92px;
      min-height: 52px;
      padding: 12px 16px;
      border: 0;
      border-radius: 7px;
      background: var(--dark);
      color: #ffffff;
      font-weight: 900;
      transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      background: #0b1220;
    }

    .send-btn:disabled,
    .prompt-btn:disabled,
    .chat-form input:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      .nav-inner {
        height: 58px;
        padding: 0 16px;
      }

      .brand span:last-child {
        display: none;
      }

      .nav-actions {
        gap: 8px;
      }

      .nav-btn {
        padding: 8px 10px;
      }

      .chat-stage {
        min-height: 100svh;
        padding: 78px 14px 14px;
      }

      .dialog {
        height: 252px;
        min-height: 252px;
      }

      .chat-stage.is-started .dialog {
        height: calc(100svh - 92px);
      }

      .dialog-head {
        padding: 14px;
        gap: 10px;
      }

      .identity h1 {
        font-size: 22px;
      }

      .identity p {
        font-size: 13px;
      }

      .state {
        display: none;
      }

      .message-stream {
        padding-left: 14px;
        padding-right: 14px;
      }

      .chat-stage.is-started .message-stream {
        padding: 14px;
      }

      .composer-area {
        padding: 0 14px 14px;
      }

      .chat-stage.is-started .composer-area {
        padding-top: 12px;
      }

      .chat-form {
        grid-template-columns: 1fr;
      }

      .send-btn {
        width: 100%;
      }

      .bubble {
        max-width: calc(100% - 44px);
        font-size: 14px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <nav class="site-nav" aria-label="主导航">
    <div class="nav-inner">
      <a class="brand" href="index.html" aria-label="返回首页">
        <span class="brand-mark">LH</span>
        <span>刘海 AI 分身</span>
      </a>
      <div class="nav-actions">
        <a class="nav-btn" href="index.html">首页</a>
        <a class="nav-btn" href="index.html#contact">联系</a>
      </div>
    </div>
  </nav>

  <main id="chatStage" class="chat-stage">
    <section id="dialog" class="dialog" aria-label="AI 对话框">
      <header class="dialog-head">
        <div class="identity">
          <div class="avatar">
            <img src="assets/avatar-liuhai.jpg" alt="刘海头像" />
          </div>
          <div>
            <h1>刘海 AI 分身</h1>
            <p>无人机系统集成 / AI 调度 / 外场交付</p>
          </div>
        </div>
        <span id="chatState" class="state">Ready</span>
      </header>

      <div id="chatLog" class="message-stream" aria-live="polite"></div>

      <div class="composer-area">
        <div class="prompt-row" aria-label="快捷问题">
          <button class="prompt-btn" type="button" data-prompt="请用 1 分钟介绍刘海的核心项目。">核心项目</button>
          <button class="prompt-btn" type="button" data-prompt="刘海现在最适合哪些无人机相关岗位？">岗位方向</button>
          <button class="prompt-btn" type="button" data-prompt="这个无人机 AI 调度项目目前做到什么程度了？有哪些边界？">项目边界</button>
        </div>
        <form id="chatForm" class="chat-form">
          <input id="chatInput" type="text" autocomplete="off" placeholder="问我一个问题" aria-label="输入问题" />
          <button id="sendButton" class="send-btn" type="submit">发送</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    const CHAT_API_URL = "/api/chat";
    const STORAGE_KEY = "lh_avatar_conversation_id";

    const stage = document.querySelector("#chatStage");
    const dialog = document.querySelector("#dialog");
    const form = document.querySelector("#chatForm");
    const input = document.querySelector("#chatInput");
    const log = document.querySelector("#chatLog");
    const state = document.querySelector("#chatState");
    const sendButton = document.querySelector("#sendButton");
    const promptButtons = document.querySelectorAll(".prompt-btn");

    let conversationId = localStorage.getItem(STORAGE_KEY) || "";
    let isBusy = false;
    let hasStarted = false;
    let chatHistory = [];

    function startConversation() {
      if (hasStarted) return;
      hasStarted = true;
      stage.classList.add("is-started");
      dialog.classList.add("is-settling");
      window.setTimeout(() => {
        dialog.classList.remove("is-settling");
      }, 760);
    }

    function setBusy(nextBusy) {
      isBusy = nextBusy;
      input.disabled = nextBusy;
      sendButton.disabled = nextBusy;
      promptButtons.forEach((button) => {
        button.disabled = nextBusy;
      });
      state.textContent = nextBusy ? "Thinking" : "Ready";
      state.classList.toggle("is-thinking", nextBusy);
    }

    function scrollToBottom() {
      log.scrollTo({
        top: log.scrollHeight,
        behavior: hasStarted ? "smooth" : "auto"
      });
    }

    function createMessage(text, type = "assistant") {
      const message = document.createElement("div");
      message.className = `message ${type}`;

      const mark = document.createElement("div");
      mark.className = "message-mark";
      mark.textContent = type === "user" ? "你" : "LH";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      message.append(mark, bubble);
      log.appendChild(message);
      scrollToBottom();
      return bubble;
    }

    function createTypingMessage() {
      const bubble = createMessage("", "assistant");
      bubble.innerHTML = '<span class="typing"><span></span><span></span><span></span></span>';
      return bubble;
    }

    function getErrorMessage(data) {
      if (!data || typeof data !== "object") return "";
      if (typeof data.detail === "string") return data.detail;
      if (data.detail && typeof data.detail === "object") return JSON.stringify(data.detail);
      return "";
    }

    async function sendMessage(rawMessage) {
      const message = rawMessage.trim();
      if (!message || isBusy) return;

      startConversation();
      createMessage(message, "user");
      input.value = "";
      const pending = createTypingMessage();
      const requestHistory = chatHistory.slice(-10);
      setBusy(true);

      try {
        const response = await fetch(CHAT_API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            conversation_id: conversationId,
            user_id: "liuhai-avatar-visitor",
            history: requestHistory
          })
        });
        const data = await response.json();
        if (!response.ok) {
          const detail = getErrorMessage(data);
          throw new Error([data.error, detail].filter(Boolean).join("：") || "请求失败");
        }

        conversationId = data.conversation_id || conversationId;
        if (conversationId) localStorage.setItem(STORAGE_KEY, conversationId);
        const answer = data.answer || "暂时没有拿到回答。";
        pending.textContent = answer;
        chatHistory.push(
          { role: "user", content: message },
          { role: "assistant", content: answer }
        );
      } catch (error) {
        pending.textContent = `AI 分身连接失败：${error.message}`;
      } finally {
        setBusy(false);
        scrollToBottom();
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      sendMessage(input.value);
    });

    promptButtons.forEach((button) => {
      button.addEventListener("click", () => {
        sendMessage(button.dataset.prompt || "");
      });
    });

    input.focus();
  </script>
</body>
</html>
